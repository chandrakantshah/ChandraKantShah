<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chandrakant Shah | Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary: #2d3436;
      --accent: #d35400;
      --bg: #ffffff;
      --light-gray: #f9f9f9;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--primary);
      overflow-x: hidden;
    }

    /* Moving Background Canvas */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.4;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 0 20px; position: relative; }

    header { padding: 100px 0 60px; }
    .hero-flex { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
    .profile-img { width: 200px; height: 200px; border-radius: 20px; object-fit: cover; border: 1px solid #eee; background: white; }

    h1 { font-size: 3rem; margin: 0; letter-spacing: -1px; }
    .role-badge { color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

    section { padding: 80px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
    h2 { font-size: 2rem; margin-bottom: 40px; }

    /* Achievement Gallery */
    .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
    .gallery { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scroll-snap-type: x mandatory; }
    .gallery::-webkit-scrollbar { height: 6px; }
    .gallery::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
    .gallery img { 
      width: 280px; height: 180px; object-fit: cover; border-radius: 8px; 
      scroll-snap-align: start; flex-shrink: 0; background: #f0f0f0;
    }

    .highlight-box { 
      background: white; border: 1px solid #eee; border-left: 5px solid var(--accent); 
      padding: 30px; border-radius: 0 12px 12px 0; margin: 40px 0; 
    }

    .social-footer { display: flex; justify-content: center; gap: 25px; padding: 40px 0; font-size: 1.5rem; }
    .social-footer a { color: var(--primary); transition: color 0.3s; }
    .social-footer a:hover { color: var(--accent); }

    .btn { 
      display: inline-block; padding: 12px 30px; border: 2px solid var(--primary); 
      color: var(--primary); text-decoration: none; font-weight: bold; border-radius: 8px; 
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="container">
  <header>
    <div class="hero-flex">
      <img id="p-photo" src="your-photo.jpeg" alt="Profile" class="profile-img">
      <div>
        <div class="role-badge" id="p-role">Loading...</div>
        <h1 id="p-name">Loading...</h1>
        <p id="p-tagline" style="font-size: 1.2rem; opacity: 0.8;"></p>
        <a id="p-email" href="" class="btn" style="margin-top:20px">Contact Me</a>
      </div>
    </div>
  </header>

  <section id="leadership">
    <h2>Leadership & Organizing</h2>
    <div class="highlight-box">
      <h3>Organized RADAR26</h3>
      <p id="radar-desc"></p>
      <small style="color: var(--accent); font-weight: bold;">24hrs Hardware Hackathon</small>
    </div>
  </section>

  <section id="wins">
    <h2>Competition Wins</h2>
    <div id="wins-container"></div>
  </section>

  <section id="participation">
    <h2>Academic & Event Participation</h2>
    <div id="p-list" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
  </section>

  <footer class="social-footer" id="socials"></footer>
</div>

<script>
// --- MOVING BACKGROUND LOGIC ---
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function initBG() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  particles = [];
  for(let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      size: Math.random() * 2
    });
  }
}

function drawBG() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#d35400';
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    p.x += p.vx; p.y += p.vy;
    if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
  });
  requestAnimationFrame(drawBG);
}
window.addEventListener('resize', initBG);
initBG(); drawBG();

// --- XML DATA LOADING ---
fetch("portfolio.xml")
  .then(res => res.text())
  .then(data => {
    const parser = new DOMParser();
    const xml = parser.parseFromString(data, "text/xml");

    // Profile
    document.getElementById("p-name").textContent = xml.querySelector("name").textContent;
    document.getElementById("p-role").textContent = xml.querySelector("role").textContent;
    document.getElementById("p-tagline").textContent = xml.querySelector("tagline").textContent;
    document.getElementById("radar-desc").textContent = xml.querySelector("event desc").textContent;
    
    // Competition Wins with Multi-Image Support
    let winsHTML = "";
    xml.querySelectorAll("win").forEach(win => {
      const images = Array.from(win.querySelectorAll("image")).map(img => `<img src="${img.textContent}" alt="Event Photo">`).join("");
      winsHTML += `
        <div class="card">
          <h3>${win.querySelector("title").textContent}</h3>
          <p style="color: #666; margin-bottom: 15px;">Organized by ${win.querySelector("organizer").textContent}</p>
          <div class="gallery">${images}</div>
        </div>`;
    });
    document.getElementById("wins-container").innerHTML = winsHTML;

    // Participation Tags
    let pTags = "";
    xml.querySelectorAll("item").forEach(item => {
      pTags += `<span style="background:#f0f0f0; padding:8px 15px; border-radius:5px; font-size:0.9rem;">${item.textContent}</span>`;
    });
    document.getElementById("p-list").innerHTML = pTags;

    // RESTORED ALL SOCIAL LINKS
    const social = xml.querySelector("social");
    const links = [
      { id: 'linkedin', icon: 'fa-linkedin' },
      { id: 'github', icon: 'fa-github' },
      { id: 'facebook', icon: 'fa-facebook' },
      { id: 'instagram', icon: 'fa-instagram' },
      { id: 'twitter', icon: 'fa-x-twitter' }
    ];
    
    let socialHTML = "";
    links.forEach(link => {
      const url = social.querySelector(link.id).textContent;
      socialHTML += `<a href="${url}" target="_blank"><i class="fa-brands ${link.icon}"></i></a>`;
    });
    document.getElementById("socials").innerHTML = socialHTML;
  });
</script>
</body>
</html>
