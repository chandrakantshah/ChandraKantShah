<!DOCTYPE html>
<html>
<head>
  <title>Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html {
  scroll-behavior: smooth;
}
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 20px;
    }

  body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #020617);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: white;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

    img {
      width: 100px;
      border-radius: 50%;
    }

    h1 { margin: 10px 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
      gap: 10px;
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      margin: 5px;
      background: linear-gradient(135deg,#3b82f6,#9333ea);
      border-radius: 10px;
      text-decoration: none;
      color: white;
    }

    .fade {
      opacity: 0;
      transform: translateY(30px);
      transition: 0.8s;
    }

    .fade.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<div class="container">

  <div id="hero" class="card fade"></div>
  <div id="about" class="card fade"></div>
  <div id="skills" class="card fade"></div>
  <div id="projects" class="card fade"></div>
  <div id="contact" class="card fade"></div>

</div>

<script>
fetch("./portfolio.xml")
  .then(function(res) {
    if (!res.ok) {
      throw new Error("XML not loading");
    }
    return res.text();
  })
  .then(function(data) {

    var parser = new DOMParser();
    var xml = parser.parseFromString(data, "text/xml");

    console.log("XML Loaded ✅");

    // PERSONAL
    var name = xml.querySelector("name") ? xml.querySelector("name").textContent : "Name missing";
    var title = xml.querySelector("title") ? xml.querySelector("title").textContent : "";
    var photo = xml.querySelector("photo") ? xml.querySelector("photo").textContent : "your-photo.jpeg";

    document.getElementById("hero").innerHTML =
      '<img src="' + photo + '">' +
      '<h1>' + name + '</h1>' +
      '<p>' + title + '</p>';

    // ABOUT
    var about = xml.querySelector("about") ? xml.querySelector("about").textContent : "";

    document.getElementById("about").innerHTML =
      '<h2>About</h2><p>' + about + '</p>';

    // SKILLS
    var skills = xml.querySelectorAll("skill");
    var skillHTML = "<h2>Skills</h2><div class='grid'>";

    for (var i = 0; i < skills.length; i++) {
      skillHTML += "<div class='card'>" + skills[i].textContent + "</div>";
    }

    skillHTML += "</div>";
    document.getElementById("skills").innerHTML = skillHTML;

    // PROJECTS
    var projects = xml.querySelectorAll("project");
    var projHTML = "<h2>Projects</h2>";

    for (var i = 0; i < projects.length; i++) {
      var pname = projects[i].querySelector("name").textContent;
      var pdesc = projects[i].querySelector("desc").textContent;

      projHTML +=
        "<div class='card'>" +
        "<h3>" + pname + "</h3>" +
        "<p>" + pdesc + "</p>" +
        "</div>";
    }

    document.getElementById("projects").innerHTML = projHTML;

    // SOCIAL
    var social = xml.querySelector("social");

    document.getElementById("contact").innerHTML =
      "<h2>Contact</h2>" +
      "<a class='btn' href='" + social.querySelector("github").textContent + "'>GitHub</a>" +
      "<a class='btn' href='" + social.querySelector("linkedin").textContent + "'>LinkedIn</a>" +
      "<a class='btn' href='" + social.querySelector("facebook").textContent + "'>Facebook</a>" +
      "<a class='btn' href='" + social.querySelector("instagram").textContent + "'>Instagram</a>" +
      "<a class='btn' href='" + social.querySelector("twitter").textContent + "'>X</a>";

  })
  .catch(function(err) {
    console.error("ERROR:", err);
    document.body.innerHTML = "<h1 style='color:red;text-align:center;'>XML NOT LOADING ❌</h1>";
  });


// Scroll animation
function reveal() {
  var elements = document.querySelectorAll(".fade");
  for (var i = 0; i < elements.length; i++) {
    var top = elements[i].getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      elements[i].classList.add("show");
    }
  }
}

window.addEventListener("scroll", reveal);
window.addEventListener("load", reveal);
</script>

</body>
</html>
