<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Chandrakant Shah</title>
  <style>
    :root {
      --soft-sand: #F4EFEA;
      --charcoal: #2F3640;
      --terracotta: #D96C59;
      --card-bg: #FFFFFF;
    }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; font-family: 'Segoe UI', sans-serif;
      background-color: var(--soft-sand); color: var(--charcoal); line-height: 1.6;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
    h2 { font-size: 2.2rem; text-align: center; margin: 2em 0 1em; color: var(--terracotta); }
    
    /* Layouts */
    #hero { text-align: center; padding: 100px 20px; }
    .about-card { background: var(--card-bg); border-radius: 12px; padding: 40px; display: flex; flex-wrap: wrap; gap: 40px; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .about-image { width: 250px; height: 250px; border-radius: 16px; object-fit: cover; border: 4px solid var(--terracotta); }
    
    .skills-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
    .skill-tag { background: white; border: 1px solid rgba(0,0,0,0.1); padding: 10px 20px; border-radius: 30px; }
    
    .project-card { display: grid; grid-template-columns: 1fr; background: white; border-radius: 16px; overflow: hidden; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    @media(min-width: 768px) { .project-card { grid-template-columns: 1fr 1fr; } }
    .project-img { width: 100%; height: 100%; object-fit: cover; min-height: 300px; }
    .project-body { padding: 40px; }
    
    .testimonial { margin-top: 20px; padding-left: 20px; border-left: 4px solid var(--terracotta); font-style: italic; }
    .btn { display: inline-block; padding: 12px 24px; background: var(--terracotta); color: white; text-decoration: none; border-radius: 8px; margin: 5px; font-weight: bold; }
    
    .fade { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
    .fade.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<div class="container" id="main-content">
  <section id="hero" class="fade">
    <h1 id="user-name">Loading...</h1>
    <p class="tagline" id="user-tagline"></p>
  </section>

  <section id="about" class="fade">
    <div class="about-card">
      <img id="user-photo" src="" alt="" class="about-image">
      <div class="about-text">
        <h2>My Story</h2>
        <p id="user-about"></p>
      </div>
    </div>
  </section>

  <h2 class="fade">Technical Toolbox</h2>
  <div id="skills-list" class="skills-grid fade"></div>

  <h2 class="fade">Impactful Projects</h2>
  <div id="projects-list"></div>

  <section id="contact" style="text-align:center; padding: 100px 0;" class="fade">
    <h2>Let's Connect</h2>
    <div id="social-links"></div>
  </section>
</div>

<script>
fetch("portfolio.xml")
  .then(res => res.text())
  .then(data => {
    const parser = new DOMParser();
    const xml = parser.parseFromString(data, "text/xml");

    // Personal Info
    document.getElementById("user-name").textContent = xml.querySelector("name").textContent;
    document.getElementById("user-tagline").innerHTML = `<strong>${xml.querySelector("role").textContent}</strong><br>${xml.querySelector("title").textContent}`;
    document.getElementById("user-about").textContent = xml.querySelector("tagline").textContent;
    document.getElementById("user-photo").src = xml.querySelector("photo").textContent;

    // Skills
    const skills = xml.querySelectorAll("skill");
    let skillHTML = "";
    skills.forEach(s => skillHTML += `<span class="skill-tag">${s.textContent}</span>`);
    document.getElementById("skills-list").innerHTML = skillHTML;

    // Projects
    const projects = xml.querySelectorAll("project");
    let projHTML = "";
    projects.forEach(p => {
      projHTML += `
        <div class="project-card fade">
          <img src="${p.querySelector("image").textContent}" class="project-img">
          <div class="project-body">
            <h3>${p.querySelector("name").textContent}</h3>
            <p>${p.querySelector("desc").textContent}</p>
            <div class="testimonial">
              "${p.querySelector("testimonial").textContent}"
              <br><strong>— ${p.querySelector("author").textContent}</strong>
            </div>
          </div>
        </div>`;
    });
    document.getElementById("projects-list").innerHTML = projHTML;

    // Social
    const social = xml.querySelector("social");
    const platforms = ["GitHub", "LinkedIn", "Facebook", "Instagram", "Twitter"];
    let socialHTML = `<a class="btn" href="mailto:${xml.querySelector("email").textContent}">Email Me</a>`;
    platforms.forEach(p => {
      socialHTML += `<a class="btn" href="${social.querySelector(p.toLowerCase()).textContent}" target="_blank">${p}</a>`;
    });
    document.getElementById("social-links").innerHTML = socialHTML;

    reveal(); // Trigger animation
  });

function reveal() {
  const fades = document.querySelectorAll(".fade");
  fades.forEach(f => {
    if (f.getBoundingClientRect().top < window.innerHeight - 50) f.classList.add("show");
  });
}
window.addEventListener("scroll", reveal);
</script>
</body>
</html>
